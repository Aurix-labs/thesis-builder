# after-market-review configuration

large_order:
  amount_min: 1000000
  top_quantile: 0.95
  window_minutes: 10
  include_call_auction: true

cache:
  reuse_existing_report: true

sources:
  enable_web_news: true
  enable_sentiment: true
  enable_lhb: true

report:
  include_next_day_watch: true
  include_trade_plan: false

market_indices:
  - code: sh000001
    name: 上证指数
  - code: sz399001
    name: 深证成指
  - code: sz399006
    name: 创业板指
  - code: sh000300
    name: 沪深300
